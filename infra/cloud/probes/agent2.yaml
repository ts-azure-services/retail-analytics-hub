properties:
  template:
    scale:
      minReplicas: 1
    containers:
      - name: agent2
        env:
          - name: AGENT_MODEL
            value: gpt-5.2
          - name: FABRIC_SQL_ENDPOINT
            value: __FABRIC_SQL_ENDPOINT__
          - name: FABRIC_SQL_DATABASE
            value: postgres-mirror
          - name: AZURE_OPENAI_ENDPOINT
            value: __AZURE_OPENAI_ENDPOINT__
        probes:
          - type: Liveness
            httpGet:
              path: /health
              port: 8002
              scheme: HTTP
          - type: Readiness
            httpGet:
              path: /health
              port: 8002
              scheme: HTTP

services:
  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:latest
    ports:
      - "18888:18888"
      - "4317:18889"
    environment:
      - DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS=true
    restart: unless-stopped

  agent1-explainer:
    build:
      context: ..
      dockerfile: agents/agent1_explainer/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ../local.env
    environment:
      - AGENT_MODEL=gpt-4o-mini
      - AGENT_TEMPERATURE=0.3
      - LOCAL_POSTGRES_DB=/data/local_postgres.duckdb
      - LOCAL_COSMOS_DB=/data/local_cosmos.duckdb
      - EVENT_HUBS_DB=/data/event_hubs.duckdb
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://aspire-dashboard:18889
      - OTEL_SERVICE_NAME=agent1-explainer
    volumes:
      - ../local_postgres.duckdb:/data/local_postgres.duckdb:ro
      - ../local_cosmos.duckdb:/data/local_cosmos.duckdb:ro
      - ../event_hubs.duckdb:/data/event_hubs.duckdb:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  agent2-narrative:
    build:
      context: ..
      dockerfile: agents/agent2_narrative/Dockerfile
    ports:
      - "8002:8002"
    env_file:
      - ../local.env
    environment:
      - AGENT_MODEL=o3
      - AGENT_TEMPERATURE=0.3
      - LOCAL_POSTGRES_DB=/data/local_postgres.duckdb
      - LOCAL_COSMOS_DB=/data/local_cosmos.duckdb
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://aspire-dashboard:18889
      - OTEL_SERVICE_NAME=agent2-narrative
    volumes:
      - ../local_postgres.duckdb:/data/local_postgres.duckdb:ro
      - ../local_cosmos.duckdb:/data/local_cosmos.duckdb:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  agent3-sentiment:
    build:
      context: ..
      dockerfile: agents/agent3_sentiment/Dockerfile
    ports:
      - "8003:8003"
    env_file:
      - ../local.env
    environment:
      - AGENT_MODEL=gpt-4o-mini
      - EVENT_HUBS_DB=/data/event_hubs.duckdb
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://aspire-dashboard:18889
      - OTEL_SERVICE_NAME=agent3-sentiment
    volumes:
      - ../event_hubs.duckdb:/data/event_hubs.duckdb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

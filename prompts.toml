3. **Models** — Table with columns: Model name, Type (Classification/Regression/Time Series), Target Variable, Key Features. List all 9 models: Conversion, Order Value, Demand Forecast, Fulfillment, Stockout, Lead Time, Churn, Campaign Response, CLV.

4. **Training Process** — Five numbered steps: Extract (DataExtractor queries), Preprocess (encoding, missing values), Train (classifier/regressor/Prophet), Evaluate (cross-validation, AUC/MAE/R²), Serialize (.joblib bundle). Note that analysis/train_models.py orchestrates training with model group filtering.


[data-docs]
prompt = """
Generate docs/data.md documenting the full data model. Structure:

1. **Introduction** — One paragraph: simulation persists to local DuckDB files (local_postgres.duckdb and local_cosmos.duckdb) that mirror cloud schemas (Azure PostgreSQL, CosmosDB).

2. **Table Lifecycle Overview** — Explain that tables come alive at different pipeline stages and not all tables are populated at seed time. Include three ASCII-art reference charts:
   - **Pipeline stage diagram**: A vertical flow showing make seed → make simulate → make sweep → make train, with a brief note on what happens to tables at each stage.
   - **PostgreSQL tables — when they populate**: An ASCII grid with columns for seed/simulate-sweep/train and rows for every Postgres table, grouped into Core Entities, Transactional, Customer & Engagement, and Training Tables (ML). Use symbols: * = seeded with data, - = schema only (empty), I = INSERT, U = UPDATE, R = read by training pipeline.
   - **CosmosDB collections — when they populate**: Same ASCII grid format for the six Cosmos collections.
   - **Training tables by workflow**: An ASCII diagram showing which workflow populates which training tables and which ML models they feed. Show the three workflows (Omnichannel, Inventory, Engagement) plus the ScenarioTracker, each with their training tables and downstream ML models.
   - Add a paragraph clarifying that "training tables" are populated BY simulation sweeps FOR ML training — they are not outputs of ML training itself.

3. **Seed Data (Operational Foundation)** — Tables created by seed scripts (seed_local.py). Organize into four sub-sections, each as a markdown table. Each table must include a Seed State column indicating whether rows are seeded or the table is created empty (schema only):
   - Core Entities (seeded with data): customers (500), products (50), suppliers (50), inventory (250 = 50 SKUs x 5 locations), replenishment_policy (~170). Columns: Table, Database, Records, Description.
   - Transactional Tables (partially seeded): orders (500 seed), order_items (~1500-2500 seed), payments (empty), purchase_orders (empty), purchase_order_lines (empty), returns (empty). Columns: Table, Database, Seed State, Description.
   - Customer & Engagement Tables (mostly schema-only at seed): loyalty_account, customer_preferences, customer_stats, customer_scores, points_transactions, support_tickets, recommendations_cache are all empty at seed; customer_purchase_history is seeded. Columns: Table, Database, Seed State, Description.
   - Document Collections (CosmosDB): Customers (500 docs), Carts (80 docs), WorkflowEvents (50 docs) are seeded; FulfillmentState, InventoryEvents, EngagementEvents are empty. Columns: Collection, Seed State, Description.

4. **Simulation Data (Training Tables)** — Tables created by local_backend.py (_ensure_ml_tables) when the simulation backend initializes. Populated during sweep runs. Organize into sub-sections:
   - Scenario Tracking: simulation_scenarios table — one row per swept scenario with metadata and aggregate KPIs. Columns: Table, Database, Populated By, Description.
   - Omnichannel Training Tables: note they are populated by MetricsCollector.persist_to_db(). Table with columns (Table, ML Models Served, Key Columns) for customer_journeys, order_metrics, hourly_demand.
   - Inventory Training Tables: note they are populated by InventoryReplenishmentWorkflow.persist_ml_data(). Same format for inventory_events, supplier_deliveries, inventory_snapshots.
   - Engagement Training Tables: note they are populated by CustomerEngagementWorkflow.persist_ml_data(). Same format for customer_snapshots, campaign_interactions, engagement_events.

Constraints:
- No Makefile commands or usage instructions
- No output samples or query examples
- No code snippets (ASCII charts are not code snippets — they are reference diagrams)
- Use markdown tables for schema listings and ASCII art for lifecycle/flow diagrams
- Verify table/collection names against seed_local.py and local_backend.py
"""

[metrics-docs]
prompt = """
Generate docs/metrics.md defining all business metrics available from the simulation data. Use `make validate-local` output, shared/metrics.py, ml/data_prep.py, sweep/scenario_tracker.py, and the workflow source files to identify every computable metric. Structure:

1. **Introduction** — One paragraph: this document defines all business metrics, organized into high-level retail KPIs and workflow-specific metrics. Each metric includes its computation method, source tables, and composite drivers that explain movement in the metric. Note that all metrics are computed from local_postgres.duckdb unless otherwise noted, and that local_cosmos.duckdb provides supplementary event-level detail.

2. **High-Level Retail Metrics** — Six executive-level KPIs that span the entire retail operation. For each metric include:
   - A one-sentence definition
   - **Computation** — A single SQL query showing how to derive the metric from its definitive source table
   - **Composite Drivers** — A markdown table with columns: Driver, Formula, Source Table, Why It Matters. Each driver is a sub-metric that explains why the headline metric moves up or down. Drivers must reference columns from the metric's source table.
   - Optional **Drill-Down** note for further slicing dimensions

   The six metrics:
   - **Total Revenue** — source: `customer_journeys`. Drivers: order volume, AOV, basket size, average unit price, channel mix
   - **Total Customers** — source: `customer_snapshots`. Drivers: active/lapsed/churned counts, by value tier, by RFM segment, avg churn risk score
   - **Conversion Rate** — source: `customer_journeys`. Drivers: cart abandonment rate by reason, payment failure rate, queue balk rate, browsing duration, conversion by channel
   - **Average Order Value** — source: `customer_journeys`. Drivers: basket size, unit price distribution, product category mix, channel effect
   - **Customer Lifetime Value** — source: `customer_snapshots`. Drivers: purchase frequency, AOV, customer tenure, loyalty points, value tier distribution, churn risk score
   - **Return Rate** — source: `order_metrics`. Drivers: returns by channel, returns by day of week, late delivery effect, fulfillment duration effect

3. **Omnichannel Purchase Workflow Metrics** — Metrics specific to the shopping journey. Note primary source tables (customer_journeys, order_metrics, hourly_demand, orders, order_items, payments). Organize into sub-sections, each as a markdown table with columns: Metric, Formula, Source, Drivers.
   - **Traffic & Demand** — arrival rate, hourly arrival/order/revenue/abandonment counts, avg basket size by hour (from hourly_demand)
   - **Conversion Funnel** — conversion rate, conversion by channel, cart abandonment rate, payment failure rate, queue balk rate
   - **Journey Timing** — avg browsing duration, avg/max queue wait time, avg checkout time, avg total journey time
   - **Order Performance** — total orders, orders by channel, orders by time of day, avg basket size, payment method distribution (no revenue metrics — those are in high-level)
   - **Fulfillment** — on-time delivery %, avg fulfillment duration, late orders, fulfillment by channel, return rate, payment success rate (absorbs former high-level Fulfillment Performance content)

4. **Inventory Replenishment Workflow Metrics** — Metrics specific to supply chain health. Note primary source tables (inventory_events, supplier_deliveries, inventory_snapshots, inventory, purchase_orders, purchase_order_lines, replenishment_policy). Organize into sub-sections:
   - **Inventory Health (Composite)** — placed at the top of this section as a summary. Cross-references to Stock Levels, Stockouts, and Replenishment Efficiency subsections where indicators are detailed.
   - **Stock Levels** — total quantity on hand, quantity by location, items below reorder point, reserved inventory, on-order inventory, days of supply
   - **Stockouts** — stockout count, stockout rate, stockout duration, stockout by SKU, stockout by location, fill rate. Include a **Stockout Composite Drivers (SimPy breakdown)** callout that explains the six interacting SimPy processes that produce stockouts: demand rate (inventory_snapshots.daily_demand), reorder point (replenishment_policy), safety stock, lead time (supplier_deliveries.actual_lead_time_days), supplier reliability (on_time, short_shipped flags), and shrinkage (inventory_events event_type='shrinkage').
   - **Supplier Performance** — on-time delivery %, avg actual lead time, lead time variance, lead time accuracy (actual vs expected), short shipment rate, received vs ordered ratio, all metrics by supplier_id
   - **Replenishment Efficiency** — total POs issued, PO status distribution, avg order quantity, reorder trigger rate, inventory turnover, shrinkage rate

5. **Customer Engagement Workflow Metrics** — Metrics specific to CRM and loyalty. Note primary source tables (customer_snapshots, campaign_interactions, engagement_events, loyalty_account, points_transactions, support_tickets, customer_scores). Organize into sub-sections:
   - **Customer Lifecycle** — active/lapsed/churn rates, retention rate, avg churn risk score, lifecycle state transitions. Include a **Churn Composite Drivers (SimPy breakdown)** callout explaining the six factors that accumulate churn_risk_score: days since last purchase, unresponsive count, total spend decline, campaign fatigue, service issues, loyalty disengagement.
   - **Customer Segmentation** — value tier distribution, RFM segment distribution, avg spend by tier, avg purchase count by segment
   - **Campaign Performance** — open rate, CTR, conversion rate, click-to-open rate, response by campaign type, response by segment, campaign fatigue. Include a **Campaign Response Composite Drivers (SimPy breakdown)** callout explaining the five factors: base response rate (config), value tier boost, RFM segment, fatigue decay from unresponsive_count, days since last engagement.
   - **Loyalty Program** — enrollment rate, avg points balance, lifetime points earned, points issued vs redeemed, redemption rate, tier distribution, transaction reasons
   - **Service & Support** — total tickets, open tickets, resolution rate, avg resolution time, avg satisfaction rating, tickets by issue type, satisfaction by issue type

6. **ML Model Metrics** — Evaluation metrics produced during model training. Organize into sub-sections:
   - **Classification Models** — Table of metrics (AUC-ROC, Accuracy, Precision, Recall, F1) with one-sentence descriptions. Then a table mapping each classification model (Conversion, Stockout, Churn, Campaign Response) to its target, AUC interpretation, and key features ranked by importance.
   - **Regression Models** — Table of metrics (MAE, RMSE, R², MAPE) with descriptions. Then a table mapping each regression model (Order Value, Fulfillment, Lead Time, CLV) to its target, unit, and key features.
   - **Time Series Model** — One row for Demand Forecast (Prophet): target, method, metrics (MAE, RMSE, MAPE). Note Prophet decomposition into trend and seasonality.
   - **Feature Importance as Metric Drivers** — One paragraph explaining that model.get_feature_importance() scores quantify which simulation parameters most influence predictions, connecting ML output back to the composite drivers defined earlier.

7. **Scenario-Level Aggregate Metrics** — Table listing the pre-computed KPI columns in simulation_scenarios (total_customers, total_orders, total_revenue, conversion_rate, stockout_count, fill_rate, avg_lead_time, churn_rate, campaign_response_rate, avg_clv) with types and descriptions. Note these are the same metrics above, pre-aggregated per scenario for sweep comparison.

8. **Cross-Workflow Metric Relationships** — An ASCII diagram showing how the three workflows interact: omnichannel orders drive inventory demand depletion and customer purchase history; inventory stockouts reduce omnichannel conversion; engagement churn reduces future traffic; campaign conversions drive incremental orders. Follow with a markdown table: Upstream Metric, Downstream Impact, Mechanism.

Constraints:
- Each metric must have exactly one definitive computation source; do not show alternative queries from different tables
- Composite drivers must reference columns from the metric's source table; cross-table influences belong in the Cross-Workflow section
- SQL examples should use actual column and table names from the DuckDB schema (verify with `make validate-local` output)
- Composite driver tables must reference real columns, not invented ones
- SimPy breakdown callouts must trace back to config parameters or simulation process logic
- No Makefile commands or usage instructions
- Prefer markdown tables over prose for metric listings
- Use SQL code blocks only for computation examples in the High-Level section; workflow-specific sections should use formula shorthand in tables
"""

[agents-docs]
prompt = """
Generate docs/agents.md documenting the multi-agent architecture. Structure:

1. **Introduction** — One paragraph: three AI agents provide on-demand analysis of simulation data. Each agent is a standalone FastAPI service running in Docker, backed by Azure OpenAI. Agents consume data via an MCP (Model Context Protocol) tool server or direct DuckDB access.

2. **Shared Infrastructure** — Table with columns: Module, Role. Cover the four modules in agents/shared/: config.py (Pydantic settings, singleton via @lru_cache), models.py (Pydantic data contracts — IntentResult, NarrativeResponse, ReviewResponse — plus shared enums TabId, QuestionType, DecisionDomain), db.py (dual-backend database abstraction — DuckDB local, Fabric SQL cloud — with execute_query() enforcing row limits and timeouts), mcp_tools.py (lazy-loaded MCP tool registry, call_tool(name, **kwargs), TAB_TOOL_MAP mapping dashboard tabs to summary/driver/extra tools).

3. **MCP Server** — One paragraph covering: protocol (Model Context Protocol over stdio), deployment (spawned as subprocess by Agents 1 and 2), tool modules (seven: main_tab, omnichannel_tab, engagement_tab, inventory_tab, reviews_tab, timeseries, aggregated), API surface (list_tools(), call_tool()), purpose (decouples agents from raw SQL with versioned, pre-defined queries).

4. **Agent 1 — Dashboard Explainer** — Sub-sections:
   - Purpose: answers specific questions about individual metrics on a single dashboard tab. Port 8001, model gpt-4o-mini (temperature 0.3).
   - API Endpoints: table (POST /chat, GET /health).
   - Workflow Steps: ASCII flowchart showing 6 steps — PREPARE_INPUT (executor: packages message/tab/view/metric), INTENT_CLASSIFIER (ChatAgent: determines tab, metric_ids, question_type), GATHER_DATA (executor: uses TAB_TOOL_MAP to call MCP summary/driver/extra tools), DATA_ANALYZER (ChatAgent: synthesizes data into narrative), RESPONSE_FORMATTER (ChatAgent: produces headline + ~150-word explanation + actionable insight), EXTRACT_OUTPUT (executor: pass-through). Each box should include bullet points describing what happens.
   - Design Patterns Showcased: table with columns Pattern, Detail. Cover: Sequential Pipeline Orchestration (WorkflowBuilder chains steps deterministically), Agent Specialization (three separate ChatAgent instances with focused prompts), MCP Tool Calling (data via call_tool not raw SQL), Structured I/O (JSON parsed into Pydantic models), Executor Pattern (@executor-decorated functions with WorkflowContext), Module-Level Shared State (_context dict carries tab/message info between executors).

5. **Agent 2 — Business Narrative** — Sub-sections:
   - Purpose: generates comprehensive cross-functional business narratives with deep reasoning. Port 8002, models gpt-4o-mini (intent, formatting) + reasoning model (analysis, deep reasoning).
   - API Endpoints: table (POST /narrative, POST /chat, GET /health).
   - Workflow Steps: ASCII flowchart showing 7 steps — PREPARE_INPUT (two modes: narrative for executive cross-tab, chat for interactive follow-up), INTENT_CLASSIFIER (ChatAgent: determines decision_domain, time_horizon, urgency, sub_questions, tabs_to_query), GATHER_DATA (executor: broader than Agent 1 — summary + extras for ALL tabs_to_query, cross-tab health check, timeseries, correlation analysis), DATA_ANALYZER (reasoning model: synthesizes multi-tab data), DEEP_REASONER (reasoning model: causal chains a→b→c, root cause analysis, prioritized recommendations, risk flags), NARRATIVE_FORMATTER (ChatAgent: executive briefing ~400 words with Executive Summary, Key Findings, Recommendations, Risk Flags), EXTRACT_OUTPUT (executor: parses into structured NarrativeResponse sections).
   - Design Patterns Showcased: table covering Hierarchical Reasoning (three-tier LLM chain: Analyzer → Deep Reasoner → Formatter), Model Specialization (reasoning models for analysis, lightweight for classification/formatting), Cross-Functional Scope (multi-tab data gathering vs Agent 1's single-tab focus), Dual Execution Modes (narrative vs chat prompt branching), Causal Chain Prompting (explicit a→b→c chains and root-cause), Structured Section Output (Pydantic sections: findings, recommendations, risks).

6. **Agent 3 — Customer Sentiment Analysis** — Sub-sections:
   - Purpose: analyzes customer reviews for sentiment and routes to chatbot response or human escalation. Includes persistent DB tracking and background retry. Port 8003, model gpt-4o-mini.
   - API Endpoints: table (POST /analyze, POST /retry, GET /health).
   - Workflow Steps: ASCII flowchart showing 5 steps — FETCH_REVIEW (executor: receives review_id and review_text), SENTIMENT_CLASSIFIER (ChatAgent: classifies very_negative/negative/neutral/positive/very_positive with score -1.0 to 1.0, key_phrases, confidence), ADAPT_CLASSIFICATION (executor: parses and packages for responder), RESPONDER (ChatAgent: deterministic routing — very_negative→human review, negative+defect→human, negative+general→empathetic reply, neutral→thank-you, positive→cheerful response; override rules for refunds/health/contamination/foreign objects), PERSIST_RESULTS (executor: writes to customer_reviews table).
   - Background Retry Loop: async task at 10-minute intervals, queries incomplete reviews with retry_count < 3, re-runs full workflow, increments retry_count on failure.
   - Database Schema: customer_reviews table DDL (id, review_text, sentiment_category, sentiment_score, status, chatbot_statement, created_at, processed_at, error_message, retry_count, last_retry_at).
   - Design Patterns Showcased: table covering Hybrid Classification (LLM sentiment + deterministic routing), Database Persistence (audit trail in customer_reviews), Background Retry Loop (lifespan-managed async, max 3 attempts), Status State Machine (To be processed → processed/Needing human review/incomplete), Safety Override Rules (hard-coded escalation for sensitive topics), Lifespan Management (FastAPI lifespan initializes DB and starts background task).

7. **Inter-Agent Communication** — ASCII diagram showing Dashboard → three agents → MCP Server → Database. Bullet points: Dashboard→Agents is HTTP REST JSON; Agents→MCP is subprocess stdio; Agent 3 writes DuckDB directly; Agents 1/2 read via MCP tools; no direct agent-to-agent communication.

8. **Design Pattern Summary** — Four sub-tables organized by category:
   - Orchestration & Workflow: Sequential Pipeline (all), Executor Pattern (all), Module-Level Context (all), Background Task (Agent 3).
   - LLM Usage: Agent Specialization (all), Model Tiering (Agent 2), Structured JSON Output (all), Chain-of-Thought (Agent 2).
   - Data & Tools: MCP Tool Abstraction (Agents 1, 2), Dual-Backend DB (all), Lazy Initialization (all).
   - Resilience & Safety: Deterministic Safety Rules (Agent 3), Retry with Backoff (Agent 3), Error Wrapping (all), Health Checks (all).

9. **Deployment** — Brief section: docker-compose.yml runs each agent as an independent container. Table with columns: Service, Port, Model, Key Env Vars. Cover agent1-explainer (8001, gpt-4o-mini, AGENT_TEMPERATURE=0.3), agent2-narrative (8002, reasoning model, AGENT_TEMPERATURE=0.3), agent3-sentiment (8003, gpt-4o-mini). Note: build context is parent directory for shared module access, health checks at 30s intervals, restart policy unless-stopped.

Constraints:
- No Makefile commands or usage instructions
- No code snippets beyond the customer_reviews DDL and ASCII diagrams
- ASCII workflow flowcharts must match the actual executor step names and WorkflowBuilder stage order from agents.py in each agent directory
- Verify model names, port numbers, and env vars against docker-compose.yml
- Design pattern tables should reference specific implementation details, not generic descriptions
- Use markdown tables for structured listings, ASCII art for workflow flows and architecture diagrams
- Cross-reference source tables from docs/data.md
"""

[dashboard-docs]
prompt = """
Generate docs/dashboard.md documenting the dashboard application. Structure:

1. **Overview** — One paragraph: the dashboard is a React SPA backed by an Express API server, displaying 36 live metrics across 5 operational tabs plus an AI-generated executive digest, with an integrated chat panel powered by Agent 1.

2. **Live Data & Refresh Cadence** — Explain the polling mechanism in detail:
   - Uses `@tanstack/react-query` with `refetchInterval` of 30 seconds (30,000 ms)
   - `staleTime` of 15 seconds — cached data considered fresh for half the polling interval
   - Transport: HTTP GET `/api/metrics/:tab` via `fetch()`
   - Database: DuckDB opened in read-only mode, queries run concurrently via `Promise.allSettled`
   - 1 retry on failure
   - Include a table summarizing: polling interval, stale time, transport, database mode, retries
   - Explain the digest startup poll: `GET /api/digest` every 5 seconds up to ~5 minutes for Agent 2
   - Note: no WebSockets or SSE — straightforward HTTP polling
   - Clarify that the "live" indicator on tiles reflects genuine live polling of real data, not static values

3. **Tabs & Personas** — Three sub-sections:
   - **Tabs** — Table with columns: Tab, ID, Description. List all 6 tabs (Digest, Main, Omnichannel, Customer Engagement, Inventory Replenishment, Customer Reviews) with their IDs and icons.
   - **Personas** — Table showing which tabs each persona sees (Master, C-Suite, Inventory Specialist, Customer Specialist, Omni Specialist).
   - **View Modes** — Numbered list of 3 view modes: Dashboard (tile grid + chat), Detail (drill-down with drivers/insights/forecast), Review Table (customer reviews tab only).

4. **Metrics** — Note that 36 metrics are defined in `metric-registry.ts`. For each of the 5 metric tabs, include a markdown table with columns: Metric, ID, Format. List all metrics:
   - Main (6): revenue, customers, conversion, aov, clv, return-rate
   - Omnichannel (8): omni-arrival-rate, omni-conversion, omni-cart-abandon, omni-avg-journey, omni-total-orders, omni-ontime, omni-fulfillment-dur, omni-payment-success
   - Customer Engagement (8): ce-active-rate, ce-churn-rate, ce-open-rate, ce-campaign-ctr, ce-enrollment-rate, ce-redemption-rate, ce-resolution-rate, ce-satisfaction
   - Inventory Replenishment (8): ir-qty-on-hand, ir-below-reorder, ir-stockout-count, ir-fill-rate, ir-supplier-ontime, ir-avg-lead-time, ir-turnover, ir-shrinkage-rate
   - Customer Reviews (6): cr-total-reviews, cr-positive-pct, cr-negative-pct, cr-avg-score, cr-needs-review, cr-processed-pct

5. **Agent Integration** — Table with columns: Agent, Port, Purpose, Trigger. Cover all three agents:
   - Agent 1 (Explainer, 8001): chat panel Q&A, triggered by user message AND auto-fires on tab activation, falls back to Spark LLM if unavailable
   - Agent 2 (Narrative, 8002): executive digest, triggered at server startup + manual regenerate
   - Agent 3 (Sentiment, 8003): review sentiment processing, triggered at server startup via POST /retry

6. **Analytics Assistant** — Document the auto-query behavior and tab navigation:
   - **Auto-Query on Tab Activation**: When a metric tab (Main, Omnichannel, Customer Engagement, Inventory Replenishment, Customer Reviews) is visited for the first time in a session with no existing messages, the dashboard sends "Tell me what's going on" to Agent 1 after a 500ms delay. Digest tab is excluded.
   - **Serialized Queries**: Only one auto-query runs at a time; each tab waits for the prior tab's query to finish (`isLoading` guard). Switching quickly is safe.
   - **Tab Navigation Behavior**: Include a table covering: serialized queries, switching quickly, returning to a tab, drill-down and back, tab switching (per-tab localStorage persistence via useKV), Refresh Chat behavior.
   - **Recommended Navigation Flow**: No special pauses needed. Navigate naturally through tabs in sequence; each auto-query fires after the previous completes.


[readme]
prompt = """
Generate README.md for this retail simulation repository. The README must contain exactly two sections:

1. **Title and description** — "# Retail Workflows" followed by a 2-3 sentence summary that covers: it's a discrete-event simulation framework built with SimPy, it simulates three interconnected retail workflows (omnichannel purchase, inventory replenishment, customer engagement), and it includes a parameter sweep pipeline that tunes assumptions and trains ML models on the generated data.

2. **Repo Structure** — A tree diagram inside a fenced code block showing every directory and Python file in the repository. Include one-line comments for each file/directory explaining its purpose. The tree must cover: simulation/ (shared/, workflows/, sweep/, ml/, run_simulation.py), analysis/, seed-data/, docs/, and Makefile. Verify the tree against actual files on disk.

Constraints:
- No Makefile commands or usage instructions
- No output samples
- No code snippets
- No setup/installation section
- No links to external resources
"""

[workflows-docs]
prompt = """
Generate docs/workflows.md describing the three simulation workflows. Structure:

1. **Introduction** — One paragraph: the simulation models three retail domains, each runs as SimPy processes over a configurable time horizon, persisting data to DuckDB.

2. **For each workflow** (Omnichannel Purchase, Inventory Replenishment, Customer Engagement), include:
   - A brief description (1-2 sentences) of what it simulates
   - **Process Flow** — Numbered steps describing each stage of the workflow (arrival → checkout → fulfillment, demand → reorder → delivery, lifecycle → campaigns → churn). Each step gets a bold label and a one-sentence explanation.
   - **Key Metrics** — Bullet list of the KPIs this workflow tracks
   - **Data Tables** — The DuckDB tables this workflow writes to, with a one-line description of each

Constraints:
- No Makefile commands or usage instructions
- No output samples or example data
- No code snippets
- Separate workflows with horizontal rules
- Use the actual table names from shared/local_backend.py
"""

[concepts-docs]
prompt = """
Generate docs/concepts.md covering the architecture and key concepts. Structure:

1. **Closed-Loop Workflow** — Describe the four-stage loop: Model → Configure → Sweep → Recommend + Apply. Explain how the loop is extensible when new assumptions are added.

2. **SimPy Environment** — One paragraph explaining discrete-event simulation: time advances only on events, processes yield timeouts and resource requests, environment runs for a configurable duration.

3. **Centralized Configuration** — Explain that SimulationConfig in shared/config.py is the single source of truth. Include a table listing each nested dataclass section (DistributionConfig, ResourceConfig, SLAConfig, OmnichannelAssumptions, InventoryAssumptions, EngagementAssumptions) with its scope and example fields.
   - **Config Overrides** subsection: explain config_overrides.json auto-loading via __post_init__.

4. **Metrics Collection** — One paragraph on MetricsCollector: tracks KPIs during simulation, computes aggregates after runs, persists raw events and summaries.

5. **Persistence** — One paragraph on DuckDB persistence via shared/persistence.py and local_backend.py, explaining the local backend mirrors cloud schemas for offline development.

Constraints:
- No Makefile commands or usage instructions
- No output samples
- Minimize code snippets (prefer tables and prose over code blocks)
- Cross-reference workflows.md for table listings
"""

[sweeps-docs]
prompt = """
Generate docs/sweeps.md documenting the parameter sweep framework. Structure:

1. **Introduction** — One paragraph: sweeps systematically explore parameter space for diverse ML training data and realistic outputs.

2. **How Sweeps Work** — Four numbered steps: define parameters, generate scenarios, execute (isolated DB copies, parallel-safe), persist results.

3. **Available Sweeps** — Table with columns: Sweep name, Workflow, Parameters Varied, Scenario count. List all 9 sweeps (conversion, demand, fulfillment, inventory_supply, inventory_policy, inventory_demand, engagement_campaign, engagement_retention, engagement_loyalty). Note that parameters are defined in sweep/config_generator.py as SweepConfig objects.

4. **Centralized Assumptions** — Table showing each assumptions dataclass (OmnichannelAssumptions, InventoryAssumptions, EngagementAssumptions) with field count and examples. Explain the generic override mechanism.

5. **Recommendations** — Three subsections:
   - Scoring: weighted composite (volume 0.3, variety 0.3, KPI realism 0.4)
   - Convergence Analysis: how converged vs. divergent parameters are handled
   - Applying Recommendations: recommendations.json → preview → config_overrides.json → auto-loaded

6. **Sweep Reporting** — Table with dimensions (Volume, Variety, Primary KPI), what each ranks, and why it matters.

7. **Extending the Framework** — Two subsections: adding a new sweep (3 steps), adding a new assumption (4 steps).

Constraints:
- No Makefile commands or usage instructions
- No output samples or log excerpts
- No "current observations" or status notes about incomplete features
- Minimal code snippets (prefer tables and prose)
"""

